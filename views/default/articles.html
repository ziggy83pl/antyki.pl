{% extends "main.tpl" %}  

{% block content %}

<div class="bg-white border-bottom py-4 mb-5">
	<div class="container">
		<h1 class="fw-bold mb-0 text-dark">{{ 'Articles'|lang }}</h1>
	</div>
</div>

<div class="container pb-5">
	{% include 'articles.tpl' %}
	{% if articles %}
		<div class="mt-5">
			{% include 'pagination.tpl' %}
		</div>
	{% endif %}
	{% if settings.ads_4 %}
		<div class="ads mt-5">{{ settings.ads_4|raw }}</div>
	{% endif %}
</div>

{% endblock %}
