{% extends "main.tpl" %}  

{% block content %}
<div class="bg-white border-bottom py-4 mb-5">
	<div class="container">
		<h1 class="fw-bold mb-0 text-dark">{{ contact_page.name }}</h1>
	</div>
</div>

<div class="container pb-5">
	<div class="row g-4">
		<div class="col-lg-6">
			<div class="card border-0 shadow-sm p-4 p-md-5 h-100 d-flex flex-column justify-content-between">
				<div>
					<h3 class="h4 fw-bold text-dark mb-4"><i class="bi bi-info-circle me-2 text-primary"></i>{{ 'Information'|lang }}</h3>
					<div class="content text-muted lh-lg">
						{{ contact_page.content|raw }}
					</div>
				</div>
				{% if settings.ads_1 %}
					<div class="ads mt-4 pt-3 border-top w-100 text-center">
						{{ settings.ads_1|raw }}
					</div>
				{% endif %}
			</div>
		</div>
		<div class="col-lg-6">
			<div class="card border-0 shadow-sm p-4 p-md-5">
				<h3 class="h4 fw-bold text-dark mb-4"><i class="bi bi-envelope me-2 text-primary"></i>{{ 'Contact form'|lang }}</h3>
				{% include 'alert.tpl' %}
				{% include 'contact_form.tpl' %}
			</div>
		</div>
	</div>
</div>
{% endblock %}
